name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Build, test, and audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: 8.0.x

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: "Atlas Balance/frontend/package-lock.json"

      - name: Restore backend
        run: dotnet restore "./Atlas Balance/backend/GestionCaja.sln"

      - name: Pull PostgreSQL test image
        run: docker pull postgres:16-alpine

      - name: Test backend
        run: dotnet test "./Atlas Balance/backend/GestionCaja.sln" -c Release --no-restore

      - name: Audit NuGet vulnerabilities
        shell: pwsh
        run: |
          $output = dotnet list "./Atlas Balance/backend/GestionCaja.sln" package --vulnerable --include-transitive
          $output
          if ($output -match 'has the following vulnerable packages|tiene los paquetes vulnerables') {
            throw 'NuGet vulnerability audit failed.'
          }

      - name: Install frontend dependencies
        working-directory: "Atlas Balance/frontend"
        run: npm ci

      - name: Audit npm vulnerabilities
        working-directory: "Atlas Balance/frontend"
        run: npm audit --audit-level=moderate

      - name: Lint frontend
        working-directory: "Atlas Balance/frontend"
        run: npm run lint

      - name: Build frontend
        working-directory: "Atlas Balance/frontend"
        run: npm run build
