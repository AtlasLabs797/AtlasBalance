name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Build, test, and audit
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          global-json-file: global.json

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: ".node-version"
          cache: npm
          cache-dependency-path: "Atlas Balance/frontend/package-lock.json"

      - name: Restore backend
        run: |
          dotnet restore "./Atlas Balance/backend/src/AtlasBalance.API/AtlasBalance.API.csproj" --locked-mode -r win-x64
          dotnet restore "./Atlas Balance/backend/src/AtlasBalance.Watchdog/AtlasBalance.Watchdog.csproj" --locked-mode -r win-x64
          dotnet restore "./Atlas Balance/backend/tests/AtlasBalance.API.Tests/AtlasBalance.API.Tests.csproj" --locked-mode

      - name: Pull PostgreSQL test image
        run: docker pull postgres:16-alpine@sha256:4e6e670bb069649261c9c18031f0aded7bb249a5b6664ddec29c013a89310d50

      - name: Test backend
        run: dotnet test "./Atlas Balance/backend/tests/AtlasBalance.API.Tests/AtlasBalance.API.Tests.csproj" -c Release --no-restore

      - name: Audit NuGet vulnerabilities
        shell: pwsh
        run: |
          $projects = @(
            "./Atlas Balance/backend/src/AtlasBalance.API/AtlasBalance.API.csproj",
            "./Atlas Balance/backend/src/AtlasBalance.Watchdog/AtlasBalance.Watchdog.csproj",
            "./Atlas Balance/backend/tests/AtlasBalance.API.Tests/AtlasBalance.API.Tests.csproj"
          )
          $output = foreach ($project in $projects) {
            dotnet list $project package --vulnerable --include-transitive
          }
          $output
          if ($output -match 'has the following vulnerable packages|tiene los paquetes vulnerables') {
            throw 'NuGet vulnerability audit failed.'
          }

      - name: Scan high-confidence secrets
        shell: pwsh
        run: |
          $patterns = @(
            '-----BEGIN (RSA|DSA|EC|OPENSSH|PRIVATE) KEY-----',
            'AKIA[0-9A-Z]{16}',
            'gh[pousr]_[A-Za-z0-9_]{36,}',
            'github_pat_[A-Za-z0-9_]{20,}',
            'xox[baprs]-[A-Za-z0-9-]{20,}',
            'sk-live-[A-Za-z0-9]{20,}',
            'sk_live_[A-Za-z0-9]{20,}',
            'npm_[A-Za-z0-9]{36,}',
            'eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+',
            'postgres(ql)?://[^:\s]+:[^@\s]+@'
          )
          $files = (git -c core.quotepath=false ls-files -z) -split "`0" | Where-Object {
            $_ -and
            $_ -notmatch '(^|/)(Otros|Skills)/' -and
            $_ -notmatch '(^|/)(bin|obj|node_modules|dist)/'
          }
          $findings = @()
          foreach ($file in $files) {
            if (-not (Test-Path -LiteralPath $file -PathType Leaf)) { continue }
            $content = Get-Content -LiteralPath $file -Raw -ErrorAction SilentlyContinue
            foreach ($pattern in $patterns) {
              if ($content -match $pattern) {
                $findings += "$file matches $pattern"
              }
            }
          }
          if ($findings.Count -gt 0) {
            $findings | ForEach-Object { Write-Error $_ }
            throw 'Secret scan failed.'
          }

      - name: Install frontend dependencies
        working-directory: "Atlas Balance/frontend"
        run: npm ci

      - name: Audit npm vulnerabilities
        working-directory: "Atlas Balance/frontend"
        run: npm audit --audit-level=moderate

      - name: Lint frontend
        working-directory: "Atlas Balance/frontend"
        run: npm run lint

      - name: Build frontend
        working-directory: "Atlas Balance/frontend"
        run: npm run build
